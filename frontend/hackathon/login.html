<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SkillQuest AI - Login</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <h1>🌍 SkillQuest AI</h1>

    <h3>Learn • Build • Conquer Your Planet</h3>

    <input
        type="text"
        id="username"
        placeholder="Enter Your Name">

    <h2>Choose Your Avatar</h2>

    <div class="avatars">

        <div class="avatar" onclick="selectAvatar(this)">👨‍🚀</div>

        <div class="avatar" onclick="selectAvatar(this)">👩‍🚀</div>

        <div class="avatar" onclick="selectAvatar(this)">🤖</div>

        <div class="avatar" onclick="selectAvatar(this)">🧙</div>

        <div class="avatar" onclick="selectAvatar(this)">👸</div>

        <div class="avatar" onclick="selectAvatar(this)">🦸</div>

    </div>

    <button onclick="startGame()">

        🚀 Start Adventure

    </button>

</div>

<script src="login.js"></script>

</body>

</html>
